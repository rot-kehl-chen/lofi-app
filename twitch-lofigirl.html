<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Stream</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#twitch-player {
    width: 100vw;
    height: 100vh;
}
</style>
</head>
<body>

<div id="twitch-player"></div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
new Twitch.Player("twitch-player", {
    channel: "LofiGirl",
    width: "100%",
    height: "100%"
});
</script>

</body>
</html>
